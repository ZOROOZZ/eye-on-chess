---
exclude_paths:
  # Database migrations (auto-generated, not testable)
  - "apps/api/prisma/migrations/**"

  # Documentation
  - "docs/**"
  - "**/*.md"

  # Docker and deployment config
  - "deployment/**"
  - "apps/api/Dockerfile"
  - "apps/api/Dockerfile.worker"
  - "apps/web/Dockerfile"
  - "Makefile"

  # CI/CD workflows
  - ".github/**"

  # Vendored/third-party files
  - "apps/web/public/stockfish/**"

  # Config files
  - "**/*.json"
  - "**/*.yml"
  - "**/*.yaml"
  - ".prettierignore"
  - ".gitignore"
  - ".eslintignore"
  - ".lintstagedrc.json"
  - "turbo.json"

  # Generated/build output
  - "**/dist/**"
  - "**/.next/**"
  - "**/coverage/**"
  - "**/node_modules/**"

  # Lock files
  - "pnpm-lock.yaml"

  # Scripts
  - "scripts/**"

  # Internal tooling
  - ".claude/**"
  - ".githooks/**"
  - ".husky/**"

  # Test setup
  - "apps/web/src/test-setup.ts"

  # Logo/assets
  - "logo.png"
  - "apps/web/public/**/*.png"
  - "apps/web/public/**/*.ico"
