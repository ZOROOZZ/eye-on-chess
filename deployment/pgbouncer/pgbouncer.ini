[databases]
eyeonchess = host=postgres port=5432 dbname=eyeonchess

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 20
min_pool_size = 5
max_client_conn = 200
log_connections = 0
log_disconnections = 0
