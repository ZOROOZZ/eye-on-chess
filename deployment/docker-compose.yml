name: eyeonchess

services:
  # ── Base image (build-only) ──────────────────────────
  base:
    image: eyeonchess-base
    build:
      context: ..
      dockerfile: deployment/Dockerfile.base

  # ── Reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eyeonchess-nginx
    restart: unless-stopped
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-}
    entrypoint: ["/bin/sh", "/etc/nginx/nginx-entrypoint.sh"]
    volumes:
      - ./nginx.http.conf:/etc/nginx/http.conf:ro
      - ./nginx.ssl.conf.template:/etc/nginx/templates/ssl.conf.template:ro
      - ./nginx-entrypoint.sh:/etc/nginx/nginx-entrypoint.sh:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Data stores ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eyeonchess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${CHESS_DB_PASS}
      POSTGRES_DB: eyeonchess
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: eyeonchess-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Database migrations + seeds (runs once, then exits) ─
  migrate:
    image: eyeonchess-migrate
    container_name: eyeonchess-migrate
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.migrate
    restart: "no"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${CHESS_DB_PASS}@postgres:5432/eyeonchess
      DIRECT_DATABASE_URL: postgresql://postgres:${CHESS_DB_PASS}@postgres:5432/eyeonchess
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Application ──────────────────────────────────────
  api:
    image: eyeonchess-api
    container_name: eyeonchess-api
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${CHESS_DB_PASS}@postgres:5432/eyeonchess
      DIRECT_DATABASE_URL: postgresql://postgres:${CHESS_DB_PASS}@postgres:5432/eyeonchess
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  web:
    image: eyeonchess-web
    container_name: eyeonchess-web
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  admin:
    image: eyeonchess-admin
    container_name: eyeonchess-admin
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: "3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002 -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  worker:
    image: eyeonchess-worker
    container_name: eyeonchess-worker
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${CHESS_DB_PASS}@postgres:5432/eyeonchess
      DIRECT_DATABASE_URL: postgresql://postgres:${CHESS_DB_PASS}@postgres:5432/eyeonchess
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

volumes:
  pgdata:
    name: eyeonchess-pgdata
  redis_data:
    name: eyeonchess-redis-data
